  <style>
    :root{
      --primary:#6651ff; --primary-dark:#3f2fb6; --accent:#f5156b;
      --gold:#d3b981; --gold-light:#ffe2ab; --base-bg:#f6f5ff;
      --body-text:#00044f; --white:#ffffff; --line:#bcb2ff; --gray-border:#e5e7eb;
      --radius-card:16px; --radius-pill:999px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
      color:var(--body-text); background:var(--base-bg);
      min-height:100vh; display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }
    .site-header{
      background:var(--white); border-bottom:1px solid var(--gray-border);
      padding:16px 24px; display:flex; justify-content:center;
    }
    .site-header img{height:34px; width:auto; display:block;}
    main{flex:1; display:flex; align-items:center; justify-content:center; padding:48px 20px;}
    .thanks-card{
      background:var(--white); border-radius:var(--radius-card);
      box-shadow:0 18px 50px rgba(63,47,182,.12);
      max-width:600px; width:100%; padding:56px 40px; text-align:center;
      border:1px solid var(--line);
    }
    .check-circle{
      width:72px; height:72px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 28px; box-shadow:0 8px 22px rgba(102,81,255,.35);
    }
    .check-circle svg{width:36px; height:36px;}
    .eyebrow{
      font-family:'Inter',sans-serif; font-weight:800; letter-spacing:.08em;
      color:var(--primary); font-size:13px; margin-bottom:12px;
    }
    h1{font-size:26px; font-weight:900; line-height:1.5; margin-bottom:18px;}
    h1 .accent{color:var(--accent);}
    .lead{font-size:15px; line-height:1.9; color:#444; margin-bottom:32px;}
    .btn-download{
      display:inline-flex; flex-direction:column; align-items:center; gap:4px;
      background:linear-gradient(135deg,var(--gold-light),var(--gold));
      color:#5a4012; font-weight:800; text-decoration:none;
      padding:18px 40px; border-radius:var(--radius-pill);
      box-shadow:0 10px 26px rgba(211,185,129,.45);
      transition:transform .15s ease, box-shadow .15s ease; font-size:17px;
    }
    .btn-download:hover{transform:translateY(-2px); box-shadow:0 14px 32px rgba(211,185,129,.55);}
    .btn-download .btn-main{display:inline-flex; align-items:center; gap:10px;}
    .btn-download .dl-icon{width:21px; height:21px; flex-shrink:0;}
    .btn-download .sub{font-size:12px; font-weight:600; opacity:.8;}
    .note{font-size:12.5px; color:#777; line-height:1.8; margin-top:24px;}
    .back-link{
      display:inline-block; margin-top:28px; font-size:14px; font-weight:700;
      color:var(--primary); text-decoration:none;
    }
    .back-link:hover{text-decoration:underline;}
    .site-footer{
      text-align:center; padding:24px; font-size:12px; color:#888;
      background:var(--white); border-top:1px solid var(--gray-border);
    }
    @media(max-width:520px){
      .thanks-card{padding:40px 22px;}
      h1{font-size:21px;}
    }
  </style>
